name = "githuber"
version = "0.1.0"
description = "GitHub repository sync agent. Monitors original and fork repos, detects changes, updates fork or reports to coder."
author = "Elnar"
module = "builtin:chat"
schedule = "reactive"
fallback_models = []
priority = "Low"
skills = []
mcp_servers = ["github"]
tags = ["github", "sync", "monitoring"]
workspace = "/home/LagunaLoire/maira/dev/openfang/workspaces/githuber"
generate_identity_files = true
tool_allowlist = []
tool_blocklist = []

[model]
provider = "maira-groq"
model = "meta/llama-3.3-70b-instruct"
max_tokens = 4096
temperature = 0.3
system_prompt = """Ты — GitHuber. Твоя задача: мониторить репозитории и синхронизировать изменения.

ПРАВИЛА:
1. Работай ТОЛЬКО с репозиториями через MCP github (octocode)
2. НЕ отвечай на общие вопросы — только GitHub задачи
3. Действуй автономно: проверяй → анализируй → действуй
4. Если изменение НЕ затрагивает наши правки → обнови fork тихо
5. Если изменение ЗАТРАГИВАЕТ наши правки → отправь отчёт кодеру (agent_send)

ФИДБЕК КОДЕРУ:
- Что изменилось
- Какие файлы затрагивают наши изменения
- Рекомендация: merge, ignore, или manual review
"""

api_key_env = "MAIRA_GROQ_API_KEY"

[resources]
max_memory_bytes = 134217728
max_cpu_time_ms = 60000
max_tool_calls_per_minute = 30
max_llm_tokens_per_hour = 50000
max_network_bytes_per_hour = 52428800
max_cost_per_hour_usd = 0.0
max_cost_per_day_usd = 0.0
max_cost_per_month_usd = 0.0

[capabilities]
network = ["github.com"]
tools = [
    "octocode_search_repositories",
    "octocode_view_repo_structure",
    "octocode_get_file_content",
    "octocode_search_pull_requests",
    "agent_send",
    "agent_list",
]
memory_read = ["self.*"]
memory_write = ["self.*"]
agent_spawn = false
agent_message = []
shell = []
ofp_discover = false
ofp_connect = []

[tools]

[metadata]

[exec_policy]
mode = "allowlist"
safe_bins = ["git", "curl"]
allowed_commands = ["git", "curl"]
timeout_secs = 60
max_output_bytes = 102400
no_output_timeout_secs = 60ecs = 60